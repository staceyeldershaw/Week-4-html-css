<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Frontend Mentor | Fylo data storage component</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap"
    rel="stylesheet"/>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

  <!-- CSS -->
    <link rel="stylesheet" href="fylo-style.css"/>
</head>

<body>
  <main class="container">
    <!-- Left Card -->
    <section class="card-left">
      <div class="logo">
        <img src="./images/logo.svg" alt="FYLO logo" />
      </div>

      <div class="icons">
        <div class="icon">
          <img src="./images/icon-document.svg" alt="Document icon" />
        </div>
        <div class="icon">
          <img src="./images/icon-folder.svg" alt="Folder icon" />
        </div>
        <div class="icon">
          <img src="./images/icon-upload.svg" alt="Upload icon" />
        </div>
      </div>
    </section>

    <!-- Right Card -->
    <section class="card-right">
      <div class="bubble">
        185<span>GB LEFT</span>
      </div>
      <p>
        You’ve used <span>815 GB</span> of your storage
      </p>
      <div class="progress-bar">
        <div class="progress"></div>
      </div>

      <div class="range">
        <span>0 GB</span>
        <span>1000 GB</span>
      </div>
    </section>
  </main>

  <div class="attribution">
    Challenge by
    <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer"
      >Frontend Mentor</a
    >.
    Coded by <a href="#">Stacey Eldershaw</a>.
  </div>
</body>

</html>
